0,704.1988 L73,704.1988 " fill="#FFFFFF" filter="url(#f1gfuxh7vsrzri)" style="stroke: #999999; stroke-width: 1.0;"/><path d="M280,704.1988 L280,714.1988 L290,714.1988 L280,704.1988 " fill="#FFFFFF" style="stroke: #999999; stroke-width: 1.0;"/><text fill="#666666" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="59" x="79" y="719.4177">Loop exits.</text><text fill="#666666" font-family="sans-serif" font-size="11" lengthAdjust="spacingAndGlyphs" textLength="134" x="141" y="719.4177">Terminal condition reached.</text><text fill="#666666" font-family="sans-serif" font-size="11" lengthAdjust="spacingAndGlyphs" textLength="157" x="79" y="732.6176">Workflow returns final CartState.</text><!--MD5=[6bc47898b60b3392b84e620b11e70e5a]
@startuml
skinparam backgroundColor transparent
skinparam sequence {
  ArrowColor #555555
  LifeLineBorderColor #555555
  LifeLineBackgroundColor #ffffff
  ParticipantBorderColor #555555
  ParticipantBackgroundColor #ffffff
  ParticipantFontColor #333333
  ParticipantFontSize 14
  ActorBorderColor #555555
  ParticipantBackgroundColor<<wf>> #4338CA
  ParticipantBorderColor<<wf>> #4338CA
  ParticipantFontColor<<wf>> #ffffff
}
skinparam note {
  BackgroundColor #ffffff
  BorderColor #999999
  FontSize 11
  FontColor #666666
}

hide footbox
hide <<wf>> stereotype

actor "Client A" as a
participant "  <color:#ffffff>Cart Workflow</color>\n  <color:#ffffff>(cart-abc-123)</color>  " as cart <<wf>>
actor "Client B" as b

note over cart #ffffff
  **Event loop starts.**
  Local state: empty cart
  Selector blocks, waiting for signals.
end note

a -> cart : **addItem**(T-shirt, $25)
note right of cart #ffffff: state = [{T-shirt, $25}]

a -> cart : **addItem**(Mug, $15)
note right of cart #ffffff: state = [{T-shirt, $25}, {Mug, $15}]

...hours later...

b -> cart : query **getCart()**
cart - -> b : [{T-shirt, $25}, {Mug, $15}]
note right of cart #ffffff: query reads local var ���\nno DB, no cache

...next day...

hnote over cart #ffffff
  Worker crashes and restarts.
  Runtime replays event history.
  State is reconstructed.
end hnote

a -> cart : **removeItem**(T-shirt)
note right of cart #ffffff: state = [{Mug, $15}]

b -> cart : query **getCart()**
cart - -> b : [{Mug, $15}]

a -> cart : **checkout**

note over cart #ffffff
  **Loop exits.** Terminal condition reached.
  Workflow returns final CartState.
end note

@enduml

