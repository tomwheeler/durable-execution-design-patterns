extends: default
font:
  catalog:
    Inter:
      normal: Inter-Regular.ttf
      bold: Inter-Bold.ttf
      italic: Inter-Italic.ttf
      bold_italic: Inter-BoldItalic.ttf
    JetBrains Mono:
      normal: JetBrainsMono-Regular.ttf
      bold: JetBrainsMono-Bold.ttf
      italic: JetBrainsMono-Italic.ttf
      bold_italic: JetBrainsMono-BoldItalic.ttf
page:
  layout: portrait
  margin: [0.75in, 0.75in, 0.75in, 0.75in]
  size: Letter
base:
  font-family: Inter
  font-size: 10.5
  line-height-length: 15
  line-height: $base_line_height_length / $base_font_size
heading:
  font-family: Inter
  font-color: #1a1a2e
  h1-font-size: 24
  h2-font-size: 20
  h3-font-size: 16
  h4-font-size: 13
code:
  font-family: JetBrains Mono
  font-size: 9
  background-color: #f5f5f5
  border-color: #e0e0e0
  border-radius: 3
  padding: [8, 10, 8, 10]
title-page:
  font-color: #1a1a2e
  title:
    font-size: 36
    font-family: Inter
    line-height: 1.2
  subtitle:
    font-size: 18
    font-family: Inter
    line-height: 1.4
  authors:
    font-size: 14
blockquote:
  font-style: italic
  border-color: #1565c0
  border-width: 3
  padding: [0, 0, 0, 12]
  font-color: #333333
caption:
  font-size: 9
  font-style: italic
  font-color: #666666
image:
  align: center
